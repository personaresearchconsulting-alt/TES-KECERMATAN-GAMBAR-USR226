<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Portal Tes Kecermatan | Persona Research</title>
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --light-bg: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-top: 10px solid var(--navy);
        }
        .header-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .header-sub {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
        }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            border-color: var(--gold);
        }
        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--navy);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-main:hover { opacity: 0.9; }
        .error-box {
            color: #b91c1c;
            background: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #fee2e2;
        }
        #menuArea { display: none; margin-top: 10px; }
        .test-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--navy);
            font-weight: 700;
            border-left: 6px solid var(--gold);
            transition: transform 0.2s, background 0.2s;
        }
        .test-link:hover {
            transform: translateX(5px);
            background: #e2e8f0;
        }
        .footer-info {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 25px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">Persona Research</div>
    <div class="header-sub">Consulting & Assessment</div>

    <div id="loginArea">
        <div id="msgError" class="error-box"></div>
        <input type="password" id="passInput" placeholder="Masukkan Password Akses" />
        <button class="btn-main" onclick="verifyAccess()">MASUK KE SISTEM</button>
    </div>

    <div id="menuArea">
        <p style="font-weight: 600; color: #475569; margin-bottom: 20px; font-size: 14px;">PILIH MODUL UJIAN:</p>
        
        <a href="simbol_geometis_2.html" class="test-link">
            <span>01. Tes Kecermatan (Gambar Hilang)</span>
            <span>➔</span>
        </a>
        
        <a href="mono_1.html" class="test-link">
            <span>02. Tes Kecermatan (Simbol)</span>
            <span>➔</span>
        </a>

        <div class="footer-info">
            Sistem Keamanan Aktif<br>
            Akses: 7 Hari • Limit: 3 Perangkat
        </div>
    </div>
</div>

<script>
    // Konfigurasi sesuai permintaan
    const SETTINGS = {
        key: "2007desember13",
        expiryDays: 7,
        maxDevices: 3
    };

    function verifyAccess() {
        const input = document.getElementById('passInput').value;
        const error = document.getElementById('msgError');
        const now = new Date().getTime();

        // 1. Validasi Password
        if (input !== SETTINGS.key) {
            error.innerText = "Password tidak sesuai!";
            error.style.display = "block";
            return;
        }

        // 2. Validasi Limit Perangkat (Local Storage)
        let deviceCount = parseInt(localStorage.getItem('pr_dev_count') || "0");
        let hasAccess = localStorage.getItem('pr_access_active');

        if (!hasAccess) {
            if (deviceCount >= SETTINGS.maxDevices) {
                error.innerText = "Akses ditolak: Limit 3 perangkat tercapai.";
                error.style.display = "block";
                return;
            }
            localStorage.setItem('pr_access_active', 'true');
            localStorage.setItem('pr_dev_count', (deviceCount + 1).toString());
        }

        // 3. Validasi Masa Berlaku (7 Hari)
        let expiryTime = localStorage.getItem('pr_expiry_time');
        if (!expiryTime) {
            expiryTime = now + (SETTINGS.expiryDays * 24 * 60 * 60 * 1000);
            localStorage.setItem('pr_expiry_time', expiryTime);
        }

        if (now > parseInt(expiryTime)) {
            error.innerText = "Masa berlaku akses Anda telah berakhir.";
            error.style.display = "block";
            return;
        }

        // Jika Lolos Semua
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('menuArea').style.display = 'block';
    }

    // Enter Key Support
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verifyAccess();
    });
</script>

</body>
</html>
