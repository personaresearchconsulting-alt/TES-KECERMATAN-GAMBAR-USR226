<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Portal Tes Kecermatan | Persona Research</title>
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --light: #f1f5f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        img.logo { width: 80px; margin-bottom: 10px; }
        h2 { color: var(--navy); margin-bottom: 5px; font-size: 1.2rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            font-size: 1rem;
        }
        .btn-access {
            background: var(--navy);
            color: #white;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-access:hover { background: #1a3a5f; }
        .menu-area { display: none; margin-top: 20px; text-align: left; }
        .test-option {
            display: block;
            padding: 15px;
            background: var(--light);
            margin-bottom: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--navy);
            font-weight: bold;
            border-left: 5px solid var(--gold);
            transition: 0.2s;
        }
        .test-option:hover { background: #dee5ed; transform: translateX(5px); }
        .error { color: #c0392b; font-size: 0.8rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>PERSONA RESEARCH</h2>
    <p>Sistem Pengamanan Tes Psikologi</p>
    
    <div id="authBox">
        <input type="password" id="passInput" placeholder="Masukkan Kata Sandi..." />
        <div id="errorMsg" class="error">Sandi salah atau akses ditolak.</div>
        <button class="btn-access" onclick="validateAccess()">MASUK SISTEM</button>
    </div>

    <div id="menuBox" class="menu-area">
        <p style="text-align:center; font-weight:bold;">PILIH MODUL TES:</p>
        <a href="mono_1.html" class="test-option">1. Tes Kecermatan (Black & White)</a>
        <a href="simbol_geometis_2.html" class="test-option">2. Tes Kecermatan (Simbol Geometris)</a>
        <p style="font-size: 0.7rem; text-align: center; margin-top: 15px;">Sesi anda berlaku hingga 7 hari ke depan.</p>
    </div>
</div>

<script>
    // KONFIGURASI KEAMANAN
    const CONFIG = {
        pass: "2007desember13",
        expiryDays: 7,
        maxDevices: 3
    };

    function validateAccess() {
        const input = document.getElementById('passInput').value;
        const error = document.getElementById('errorMsg');
        const now = new Date();

        // 1. Cek Kata Sandi
        if (input !== CONFIG.pass) {
            error.innerText = "Kata sandi salah!";
            error.style.display = "block";
            return;
        }

        // 2. Cek Limit Device (Fingerprint sederhana via LocalStorage)
        let deviceID = localStorage.getItem('persona_device_id');
        let registeredDevices = parseInt(localStorage.getItem('persona_device_count') || "0");

        if (!deviceID) {
            if (registeredDevices >= CONFIG.maxDevices) {
                error.innerText = "Batas maksimal 3 perangkat tercapai!";
                error.style.display = "block";
                return;
            }
            // Daftarkan perangkat baru
            localStorage.setItem('persona_device_id', 'DEV-' + Math.random().toString(36).substr(2, 9));
            localStorage.setItem('persona_device_count', (registeredDevices + 1).toString());
        }

        // 3. Cek Masa Berlaku (Expired)
        let expiryDate = localStorage.getItem('persona_expiry');
        if (!expiryDate) {
            // Set kedaluwarsa 7 hari dari login pertama
            const expireAt = now.getTime() + (CONFIG.expiryDays * 24 * 60 * 60 * 1000);
            localStorage.setItem('persona_expiry', expireAt);
            expiryDate = expireAt;
        }

        if (now.getTime() > parseInt(expiryDate)) {
            error.innerText = "Masa akses telah habis (7 Hari)!";
            error.style.display = "block";
            return;
        }

        // Jika semua lolos
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('menuBox').style.display = 'block';
    }

    // Auto-login jika sudah pernah masuk dan belum expired
    window.onload = function() {
        const expiry = localStorage.getItem('persona_expiry');
        if (expiry && new Date().getTime() < parseInt(expiry)) {
            // Tetap minta password untuk keamanan, atau bisa lgsg buka menuBox
        }
    }
</script>

</body>
</html>
