<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TES KECERMATAN GAMBAR - Persona Research & Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --ivory: #f8fafc;
            --white: #ffffff;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            background: var(--white);
            max-width: 450px;
            width: 90%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-top: 8px solid var(--navy);
            text-align: center;
        }
        .logo-text {
            color: var(--navy);
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .status-box {
            background: var(--ivory);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            line-height: 1.5;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--navy);
        }
        .btn-access {
            background: var(--navy);
            color: var(--gold);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .link-grid {
            display: none;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .test-link {
            background: var(--ivory);
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--navy);
            font-weight: 700;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
            font-size: 13px;
        }
        .test-link:hover {
            border-color: var(--gold);
            background: #fff;
        }
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-text">TES KECERMATAN GAMBAR</div>
    <div class="subtitle">Persona Research & Consulting</div>

    <div id="loginSection">
        <div class="status-box" id="deviceStatus">Mengecek sistem keamanan...</div>
        <input type="password" id="passInput" placeholder="Masukkan Password Akses">
        <button class="btn-access" onclick="validateAccess()">BUKA MODUL</button>
    </div>

    <div id="linkSection" class="link-grid">
        <div class="status-box" style="background: #dcfce7; color: #166534; border-color: #bbf7d0;">
            <b>AKSES DIIZINKAN</b><br>
            <span id="expiryTimer">Masa aktif 7 hari (Trigger: Device 3)</span>
        </div>
        <a href="simbol_geometis_2.html" class="test-link">1. SIMULASI SIMBOL GEOMETRIS</a>
        <a href="mono_1.html" class="test-link">2. SIMULASI GAMBAR MONOKROM (BW)</a>
    </div>

    <div class="footer">
        &copy; 2026 Persona Research & Consulting<br>
        WA: 0877 4251 5786
    </div>
</div>

<script>
    const CONFIG = {
        pass: "desember13", 
        maxDevices: 3, 
        durationDays: 7,
        storageKey: "psy_portal_gambar_v5"
    };

    function validateAccess() {
        const input = document.getElementById('passInput').value;
        const now = new Date().getTime();
        
        let localData = JSON.parse(localStorage.getItem(CONFIG.storageKey)) || {
            devicesUsed: 0,
            expiryTime: null,
            authorized: false
        };

        if (input !== CONFIG.pass) {
            alert("Password Salah!");
            return;
        }

        if (!localData.authorized) {
            localData.devicesUsed += 1;
            localData.authorized = true;

            // Timer 7 hari aktif saat perangkat ke-3 login
            if (localData.devicesUsed >= CONFIG.maxDevices && !localData.expiryTime) {
                localData.expiryTime = now + (CONFIG.durationDays * 24 * 60 * 60 * 1000);
            }
        }

        localStorage.setItem(CONFIG.storageKey, JSON.stringify(localData));
        checkState();
    }

    function checkState() {
        const localData = JSON.parse(localStorage.getItem(CONFIG.storageKey));
        const now = new Date().getTime();

        if (localData && localData.authorized) {
            if (localData.expiryTime && now > localData.expiryTime) {
                document.getElementById('deviceStatus').innerHTML = "<b style='color:red'>AKSES KADALUWARSA</b><br>Batas waktu 7 hari telah habis.";
                document.getElementById('passInput').style.display = "none";
                document.querySelector('.btn-access').style.display = "none";
                return;
            }

            document.getElementById('loginSection').style.display = "none";
            document.getElementById('linkSection').style.display = "grid";

            if (localData.expiryTime) {
                updateTimer(localData.expiryTime);
            } else {
                document.getElementById('expiryTimer').textContent = `Status: Aktif (Device ${localData.devicesUsed}/${CONFIG.maxDevices})`;
            }
        } else {
            document.getElementById('deviceStatus').textContent = "Silakan masukkan password untuk mengakses simulasi gambar.";
        }
    }

    function updateTimer(expiry) {
        setInterval(() => {
            const now = new Date().getTime();
            const diff = expiry - now;
            if (diff <= 0) {
                location.reload();
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('expiryTimer').textContent = `Sisa Waktu: ${days} Hari ${hours} Jam ${mins} Menit`;
        }, 1000);
    }

    window.onload = checkState;
</script>

</body>
</html>
