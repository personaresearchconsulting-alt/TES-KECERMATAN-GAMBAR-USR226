<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TES KECERMATAN GAMBAR HILANG - PERSONA RESEARCH</title>
    <style>
        :root { --navy: #0b2340; --gold: #d4a017; --gray: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--gray); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--navy); }
        h1 { font-size: 18px; color: var(--navy); margin-bottom: 5px; }
        h2 { font-size: 14px; color: var(--gold); margin-bottom: 25px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; margin-bottom: 15px; }
        .btn-access { background: var(--navy); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #menuList { display: none; margin-top: 20px; }
        .menu-item { display: block; background: #f8fafc; padding: 15px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; text-decoration: none; color: var(--navy); font-weight: bold; }
        .footer { margin-top: 25px; font-size: 11px; color: #64748b; border-top: 1px solid #eee; padding-top: 15px; }
        .status-msg { font-size: 12px; color: #c0392b; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>TES KECERMATAN GAMBAR HILANG</h1>
    <h2>PERSONA RESEARCH & CONSULTING</h2>

    <div id="authBox">
        <input type="password" id="passInput" placeholder="Masukkan Password Akses">
        <button class="btn-access" onclick="verifyAccess()">MASUK KE MENU</button>
        <p id="errorMsg" class="status-msg"></p>
    </div>

    <div id="menuList">
        <p style="font-size: 13px; color: #64748b;">Silakan pilih modul tes:</p>
        <a href="mono_1.html" class="menu-item">1. Simulasi Kecermatan (Black & White)</a>
        <a href="simbol_geometis_2.html" class="menu-item">2. Simulasi Kecermatan (Geometis)</a>
    </div>

    <div class="footer">
        <b>Persona Research & Consulting</b><br>
        WhatsApp: 0877 4251 5786
    </div>
</div>

<script>
    const CONFIG = {
        pass: "2007desember13", //
        durationDays: 7, //
        maxDevices: 3, //
        minActiveDevice: 2 //
    };

    function verifyAccess() {
        const input = document.getElementById('passInput').value;
        const errorMsg = document.getElementById('errorMsg');
        const now = new Date().getTime();

        if (input !== CONFIG.pass) {
            errorMsg.textContent = "Password salah!";
            return;
        }

        let firstLogin = localStorage.getItem('persona_first_login');
        let deviceID = localStorage.getItem('persona_device_id');
        let registeredDevices = JSON.parse(localStorage.getItem('registered_devices') || "[]");

        // Catat waktu login pertama kali
        if (!firstLogin) {
            firstLogin = now;
            localStorage.setItem('persona_first_login', firstLogin);
        }

        // Cek apakah sudah lewat 7 hari dari login pertama
        const expiryTime = parseInt(firstLogin) + (CONFIG.durationDays * 24 * 60 * 60 * 1000);
        if (now > expiryTime) {
            errorMsg.textContent = "Masa akses 7 hari Anda telah habis.";
            return;
        }

        // Registrasi ID Perangkat Baru
        if (!deviceID) {
            if (registeredDevices.length < CONFIG.maxDevices) {
                deviceID = 'DEV-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('persona_device_id', deviceID);
                registeredDevices.push(deviceID);
                localStorage.setItem('registered_devices', JSON.stringify(registeredDevices));
            } else {
                errorMsg.textContent = "Batas maksimal 3 perangkat tercapai.";
                return;
            }
        }

        // Syarat Aktivasi: Minimal 2 perangkat harus sudah pernah login
        if (registeredDevices.length < CONFIG.minActiveDevice) {
            errorMsg.textContent = "Akses terdaftar. Silakan login dari perangkat ke-2 untuk mengaktifkan menu.";
            return;
        }

        document.getElementById('authBox').style.display = 'none';
        document.getElementById('menuList').style.display = 'block';
    }
</script>

</body>
</html>
